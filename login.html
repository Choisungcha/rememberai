<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 리멤버AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f8f9fa; }
        .auth-container {
            max-width: 450px;
            margin: 80px auto;
            padding: 50px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .auth-logo img { height: 70px; margin-bottom: 30px; }
        .auth-title { font-size: 2rem; color: var(--navy-primary); margin-bottom: 10px; }
        .auth-subtitle { color: var(--text-light); margin-bottom: 40px; font-size: 1.1rem; }
        .form-group { text-align: left; margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 500; color: var(--navy-primary); }
        .form-control {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Noto Sans KR', sans-serif;
        }
        .form-control:focus { border-color: var(--gold-secondary); outline: none; }
        .btn-auth {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--navy-primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: var(--transition);
        }
        .btn-auth:hover { background: var(--gold-secondary); }
        .auth-footer { margin-top: 30px; font-size: 1rem; color: var(--text-light); }
        .auth-footer a { color: var(--navy-primary); font-weight: 600; text-decoration: underline; }
        .back-home { display: inline-block; margin-top: 20px; color: var(--text-light); font-size: 0.9rem; }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MVSHZFLK"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="auth-container">
        <div class="auth-logo">
            <a href="index.html"><img src="logo.png" alt="리멤버AI"></a>
        </div>
        <h1 class="auth-title">다시 뵙게 되어 반갑습니다</h1>
        <p class="auth-subtitle">선생님의 소중한 기록을 이어가세요.</p>
        
        <form>
            <div class="form-group">
                <label for="email">휴대폰 번호 또는 이메일</label>
                <input type="text" id="email" class="form-control" placeholder="내용을 입력해주세요">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력해주세요">
            </div>
            <button type="submit" class="btn-auth">로그인하기</button>
        </form>

        <div class="auth-footer">
            아직 회원이 아니신가요? <a href="signup.html">회원가입하기</a>
        </div>
        <a href="index.html" class="back-home">홈으로 돌아가기</a>
    </div>
</body>
</html>
